events {
  worker_connections 1024;
}

http {
  upstream nextjs {
    server api:3000;
  }

  upstream fastapi {
    server matching:8000;
  }

  server {
    listen 80;
    server_name localhost;

    # Next.js API / Frontend
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # FastAPI Matching Service (内部APIとして /internal/ 以下に配置)
    location /internal/matching/ {
      # 本番では内部ネットワークのみ許可
      # allow 10.0.0.0/8;
      # deny all;
      rewrite ^/internal/matching/(.*) /$1 break;
      proxy_pass http://fastapi;
      proxy_set_header Host $host;
    }

    # FastAPI OpenAPI Docs (開発環境のみ)
    location /matching/docs {
      proxy_pass http://fastapi/docs;
      proxy_set_header Host $host;
    }
  }
}
